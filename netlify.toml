# Netlify build & deploy configuration for this Create React App site.
[build]
  command = "yarn build"
  publish = "build"

[build.environment]
  # CRA treats lint warnings as errors when CI=true (Netlify's default).
  # This keeps the build resilient to non-fatal warnings.
  CI = "false"
  NODE_VERSION = "20"

# SPA fallback: serve index.html for any path so client-side routes resolve.
# (Harmless with the app's hash routing, and future-proofs a switch to
# BrowserRouter.)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
